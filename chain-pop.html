<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chain Pop</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d1a;
    color: #e2e8f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 16px;
  }

  h1 { font-size: 1.5rem; letter-spacing: 4px; margin-bottom: 16px; color: #9f7aea; }

  #hud {
    display: flex;
    gap: 24px;
    margin-bottom: 12px;
    font-size: 0.85rem;
    font-family: monospace;
  }
  #hud span { color: #718096; }
  #hud strong { color: #f6c90e; }
  #undo-btn {
    background: #2d3748;
    border: 1px solid #4a5568;
    color: #e2e8f0;
    padding: 4px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    font-family: monospace;
  }
  #undo-btn:disabled { opacity: 0.3; cursor: default; }

  #moves-bonus {
    color: #68d391;
    font-size: 0.85rem;
    margin-left: 4px;
    opacity: 0;
    transition: opacity 0.15s ease;
    font-weight: bold;
  }

  /* F. Combo badge */
  @keyframes combo-pulse {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.15); }
  }
  #combo-badge {
    visibility: hidden;
    color: #f6c90e;
    font-family: monospace;
    font-weight: bold;
    font-size: 1rem;
    letter-spacing: 2px;
    margin-bottom: 8px;
    height: 20px;
    animation: combo-pulse 0.4s ease infinite;
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 4px;
    width: min(480px, 96vw);
  }

  /* G. Board shake */
  @keyframes grid-shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-6px); }
    40%     { transform: translateX(6px); }
    60%     { transform: translateX(-4px); }
    80%     { transform: translateX(4px); }
  }
  #grid.shake { animation: grid-shake 0.4s ease; }

  @keyframes tile-fall {
    0%   { transform: translateY(-52px) scaleY(0.7); opacity: 0; }
    75%  { transform: translateY(4px) scaleY(1.04); opacity: 1; }
    100% { transform: translateY(0) scaleY(1); opacity: 1; }
  }
  .tile.falling {
    animation: tile-fall 0.32s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  #next-row {
    width: min(480px, 96vw);
    margin-bottom: 6px;
  }
  #next-label {
    font-family: monospace;
    font-size: 0.65rem;
    color: #4a5568;
    letter-spacing: 3px;
    margin-bottom: 4px;
  }
  #next-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 4px;
    width: 100%;
    opacity: 0.55;
  }
  .next-tile {
    height: 20px;
    border-radius: 3px;
  }
  .next-tile[data-color="0"] { background: #9f7aea; }
  .next-tile[data-color="1"] { background: #e94560; }
  .next-tile[data-color="2"] { background: #63b3ed; }
  .next-tile[data-color="3"] { background: #f6c90e; }

  .tile {
    aspect-ratio: 1;
    border-radius: 5px;
    cursor: pointer;
    transition: transform 0.12s ease, opacity 0.12s ease;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .tile:hover { transform: scale(1.08); }
  .tile[data-color="-1"]:hover { transform: none; }

  /* C. Shimmer on hover group */
  @keyframes shimmer {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  .tile.highlighted {
    outline: 2px solid rgba(255,255,255,0.8);
    transform: scale(1.05);
    background-image: linear-gradient(90deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);
    background-size: 200% 100%;
    animation: shimmer 0.8s linear infinite;
  }

  .tile.popping { transform: scale(0); opacity: 0; }
  .tile[data-color="0"] { background: #9f7aea; }
  .tile[data-color="1"] { background: #e94560; }
  .tile[data-color="2"] { background: #63b3ed; }
  .tile[data-color="3"] { background: #f6c90e; }
  .tile[data-color="-1"] { background: transparent; cursor: default; }

  /* A. Particle burst */
  @keyframes particle-fly {
    0%   { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
  }
  .particle {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    pointer-events: none;
    animation: particle-fly 0.4s ease forwards;
    z-index: 20;
  }

  /* B. Score pop */
  @keyframes score-pop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.5); color: #fff; }
    100% { transform: scale(1); }
  }
  .score-bump { animation: score-pop 0.3s ease; }

  /* E. Floating score text */
  @keyframes float-score {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-50px) scale(0.8); }
  }
  .float-score {
    position: fixed;
    pointer-events: none;
    font-family: monospace;
    font-weight: bold;
    font-size: 1.2rem;
    color: #f6c90e;
    animation: float-score 0.7s ease forwards;
    z-index: 20;
  }

  /* J. Danger pulse */
  @keyframes danger-pulse {
    0%, 100% { transform: scale(1); color: #e94560; }
    50%       { transform: scale(1.2); color: #fff; }
  }
  #moves-display.danger { animation: danger-pulse 0.6s ease infinite; }
  body.danger-mode::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    box-shadow: inset 0 0 60px rgba(233,69,96,0.25);
    z-index: 5;
  }

  #new-game-btn {
    margin-top: 14px;
    background: #2d3748;
    border: 1px solid #4a5568;
    color: #e2e8f0;
    padding: 8px 28px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    letter-spacing: 1px;
  }
  #new-game-btn:hover { background: #4a5568; }

  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  #overlay.visible { display: flex; }
  #overlay-box {
    background: #1a1a2e;
    border: 1px solid #4a5568;
    border-radius: 12px;
    padding: 32px 48px;
    text-align: center;
  }
  #overlay-box h2 { font-size: 1.6rem; margin-bottom: 12px; }
  #overlay-box p { color: #a0aec0; margin-bottom: 20px; font-family: monospace; }
  #play-again-btn {
    background: #9f7aea;
    border: none;
    color: #fff;
    padding: 10px 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
  }
</style>
</head>
<body>
<h1>CHAIN POP</h1>
<div id="hud">
  <span>SCORE <strong id="score-display">0</strong></span>
  <span>MOVES <strong id="moves-display">25</strong><span id="moves-bonus"></span></span>
  <span>BEST <strong id="best-display">0</strong></span>
  <button id="undo-btn" disabled>UNDO (1)</button>
</div>
<div id="combo-badge"></div>
<div id="next-row">
  <div id="next-label">NEXT</div>
  <div id="next-grid"></div>
</div>
<div id="grid"></div>
<button id="new-game-btn">New Game</button>

<div id="overlay">
  <div id="overlay-box">
    <h2 id="overlay-title">You Win!</h2>
    <p id="overlay-msg">Score: 0</p>
    <div id="overlay-actions" style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <button id="watch-ad-btn" style="display:none;background:#68d391;border:none;color:#1a2f1a;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:1rem;font-weight:bold;">Watch Ad (Continue)</button>
      <button id="play-again-btn">Play Again</button>
    </div>
  </div>
</div>

<script>
// --- State ---
const ROWS = 8, COLS = 8, NUM_COLORS = 4;
const MAX_MOVES = 25;
const TILE_COLORS = ['#9f7aea', '#e94560', '#63b3ed', '#f6c90e'];
let grid = [];
let score = 0;
let movesLeft = MAX_MOVES;
let pendingContinue = null; // 'moves' | 'bomb'
let undoSnapshot = null;
let undosLeft = 1;
let gameOver = false;
let animating = false;
let popTimer = null;
let comboStreak = 0;
let _lastRenderedScore = 0;
let tileQueue = [];

function startNewGame() {
  clearTimeout(popTimer);
  animating = false;
  score = 0;
  _lastRenderedScore = 0;
  movesLeft = MAX_MOVES;
  pendingContinue = null;
  undosLeft = 1;
  undoSnapshot = null;
  gameOver = false;
  comboStreak = 0;
  tileQueue = [];
  fillQueue();
  grid = generateGrid();
  document.getElementById('overlay').classList.remove('visible');
  document.getElementById('watch-ad-btn').style.display = 'none';
  document.getElementById('combo-badge').style.visibility = 'hidden';
  document.body.classList.remove('danger-mode');
  render();
}

function generateGrid() {
  return Array.from({ length: ROWS }, () =>
    Array.from({ length: COLS }, () => Math.floor(Math.random() * NUM_COLORS))
  );
}

function findGroup(r, c) {
  const color = grid[r][c];
  if (color === -1) return [];
  const visited = new Set();
  const queue = [[r, c]];
  const key = (r, c) => r * COLS + c;
  visited.add(key(r, c));
  while (queue.length) {
    const [cr, cc] = queue.shift();
    for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nr = cr + dr, nc = cc + dc;
      if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS &&
          !visited.has(key(nr, nc)) && grid[nr][nc] === color) {
        visited.add(key(nr, nc));
        queue.push([nr, nc]);
      }
    }
  }
  return [...visited].map(k => [Math.floor(k / COLS), k % COLS]);
}

function getBest() {
  try { return parseInt(localStorage.getItem('chainpop-best') || '0', 10); } catch { return 0; }
}

function applyGravity() {
  for (let c = 0; c < COLS; c++) {
    const tiles = [];
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[r][c] !== -1) tiles.push(grid[r][c]);
    }
    for (let r = ROWS - 1; r >= 0; r--) {
      grid[r][c] = tiles.length ? tiles.shift() : -1;
    }
  }
}

function fillQueue() {
  while (tileQueue.length < COLS * 2) {
    tileQueue.push(Math.floor(Math.random() * NUM_COLORS));
  }
}

function refillGrid() {
  const filled = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] === -1) {
        if (!tileQueue.length) fillQueue();
        grid[r][c] = tileQueue.shift();
        filled.push([r, c]);
      }
    }
  }
  fillQueue();
  return filled;
}

function getBonusMoves(n) {
  if (n >= 12) return 3;
  if (n >= 8) return 2;
  if (n >= 5) return 1;
  return 0;
}

function showMovesBonus(n) {
  const el = document.getElementById('moves-bonus');
  el.textContent = `+${n}`;
  el.style.opacity = '1';
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.style.opacity = '0'; }, 700);
}

function applyBomb() {
  const r = Math.floor(Math.random() * (ROWS - 2)) + 1;
  const c = Math.floor(Math.random() * (COLS - 2)) + 1;
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      grid[r + dr][c + dc] = -1;
    }
  }
  applyGravity();
  refillGrid();
}

// A. Particle burst — fires at pop time using tile positions
function spawnParticles(group) {
  let sumX = 0, sumY = 0, count = 0;
  group.forEach(([r, c]) => {
    const el = document.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
    if (!el) return;
    const rect = el.getBoundingClientRect();
    sumX += rect.left + rect.width / 2;
    sumY += rect.top + rect.height / 2;
    count++;
  });
  if (!count) return;
  const cx = sumX / count, cy = sumY / count;
  const color = TILE_COLORS[grid[group[0][0]][group[0][1]]] || '#fff';
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2;
    const dist = 40 + Math.random() * 25;
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.background = color;
    p.style.left = (cx - 4) + 'px';
    p.style.top = (cy - 4) + 'px';
    p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 420);
  }
}

// E. Floating +N score at group center
function spawnFloatScore(group, points) {
  let sumX = 0, sumY = 0, count = 0;
  group.forEach(([r, c]) => {
    const el = document.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
    if (!el) return;
    const rect = el.getBoundingClientRect();
    sumX += rect.left + rect.width / 2;
    sumY += rect.top + rect.height / 2;
    count++;
  });
  if (!count) return;
  const el = document.createElement('div');
  el.className = 'float-score';
  el.textContent = `+${points}`;
  el.style.left = (sumX / count - 16) + 'px';
  el.style.top = (sumY / count - 10) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 720);
}

function popGroup(group) {
  if (group.length < 2 || animating || gameOver) return;
  animating = true;
  if (undosLeft > 0) undoSnapshot = { grid: grid.map(row => [...row]), score, movesLeft };

  spawnParticles(group); // A — fires while tiles are still in DOM

  group.forEach(([r, c]) => {
    document.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`)
      ?.classList.add('popping');
  });

  popTimer = setTimeout(() => {
    const points = group.length * group.length;
    spawnFloatScore(group, points); // E — tiles still in DOM here

    group.forEach(([r, c]) => { grid[r][c] = -1; });
    score += points;
    movesLeft--;
    const bonus = getBonusMoves(group.length);
    if (bonus > 0) { movesLeft += bonus; showMovesBonus(bonus); }

    // F. Combo streak
    if (group.length >= 5) {
      comboStreak++;
    } else {
      comboStreak = 0;
    }
    const comboBadge = document.getElementById('combo-badge');
    if (comboStreak >= 2) {
      comboBadge.textContent = `×${comboStreak} COMBO!`;
      comboBadge.style.visibility = 'visible';
    } else {
      comboBadge.style.visibility = 'hidden';
    }

    // G. Shake on 8+ tile pop
    if (group.length >= 8) {
      const gridEl = document.getElementById('grid');
      gridEl.classList.add('shake');
      setTimeout(() => gridEl.classList.remove('shake'), 400);
    }

    applyGravity();
    const filled = refillGrid();
    const best = getBest();
    if (score > best) {
      try { localStorage.setItem('chainpop-best', score); } catch {}
    }
    animating = false;
    render();
    filled.forEach(([r, c]) => {
      const tile = document.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
      if (!tile) return;
      tile.style.animationDelay = `${c * 18}ms`;
      tile.classList.add('falling');
    });
    checkEndConditions();
  }, 150);
}

function checkEndConditions() {
  if (gameOver) return;

  if (movesLeft === 0) {
    pendingContinue = 'moves';
    showOverlay('Out of Moves!', `Score: ${score} — Watch an ad for +8 moves`);
    document.getElementById('watch-ad-btn').style.display = 'inline-block';
    return;
  }

  const hasMove = grid.some((row, r) =>
    row.some((_, c) => findGroup(r, c).length >= 2)
  );
  if (!hasMove) {
    pendingContinue = 'bomb';
    showOverlay('No Moves Left', `Score: ${score} — Watch an ad to use a bomb`);
    document.getElementById('watch-ad-btn').style.display = 'inline-block';
  }
}

function showOverlay(title, msg) {
  gameOver = true;
  document.getElementById('overlay-title').textContent = title;
  document.getElementById('overlay-msg').textContent = msg;
  document.getElementById('overlay').classList.add('visible');
}

function render() {
  // B. Score bump animation
  const scoreEl = document.getElementById('score-display');
  if (score > _lastRenderedScore) {
    scoreEl.classList.remove('score-bump');
    void scoreEl.offsetWidth; // force reflow to restart animation
    scoreEl.classList.add('score-bump');
    setTimeout(() => scoreEl.classList.remove('score-bump'), 300);
  }
  _lastRenderedScore = score;
  scoreEl.textContent = score;

  document.getElementById('best-display').textContent = getBest();
  document.getElementById('undo-btn').disabled = undosLeft === 0 || undoSnapshot === null;
  document.getElementById('undo-btn').textContent = `UNDO (${undosLeft})`;

  // J. Danger mode
  const movesEl = document.getElementById('moves-display');
  movesEl.textContent = movesLeft;
  if (movesLeft <= 5) {
    movesEl.classList.add('danger');
    document.body.classList.add('danger-mode');
  } else {
    movesEl.classList.remove('danger');
    document.body.classList.remove('danger-mode');
  }

  const nextGridEl = document.getElementById('next-grid');
  nextGridEl.innerHTML = '';
  for (let i = 0; i < COLS; i++) {
    const t = document.createElement('div');
    t.className = 'next-tile';
    t.dataset.color = tileQueue[i] ?? 0;
    nextGridEl.appendChild(t);
  }

  const gridEl = document.getElementById('grid');
  gridEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.dataset.color = grid[r][c];
      tile.dataset.r = r;
      tile.dataset.c = c;

      tile.addEventListener('mouseenter', () => {
        const group = findGroup(r, c);
        if (group.length < 2) return;
        // C + D: shimmer (CSS) + color-matched glow (JS)
        group.forEach(([gr, gc]) => {
          const t = document.querySelector(`.tile[data-r="${gr}"][data-c="${gc}"]`);
          if (!t) return;
          t.classList.add('highlighted');
          t.style.boxShadow = `0 0 10px 3px ${TILE_COLORS[grid[gr][gc]] || '#fff'}`;
        });
      });
      tile.addEventListener('mouseleave', () => {
        document.querySelectorAll('.tile.highlighted').forEach(t => {
          t.classList.remove('highlighted');
          t.style.boxShadow = '';
        });
      });
      tile.addEventListener('click', () => {
        const group = findGroup(r, c);
        if (group.length < 2) return;
        popGroup(group);
      });

      gridEl.appendChild(tile);
    }
  }
}

document.getElementById('new-game-btn').addEventListener('click', startNewGame);
document.getElementById('undo-btn').addEventListener('click', undo);
document.getElementById('play-again-btn').addEventListener('click', startNewGame);
document.getElementById('watch-ad-btn').addEventListener('click', () => {
  gameOver = false;
  undoSnapshot = null;
  undosLeft = 0;
  document.getElementById('watch-ad-btn').style.display = 'none';
  document.getElementById('overlay').classList.remove('visible');
  if (pendingContinue === 'moves') {
    movesLeft += 8;
  } else if (pendingContinue === 'bomb') {
    applyBomb();
  }
  pendingContinue = null;
  render();
  checkEndConditions();
});

function undo() {
  if (!undoSnapshot || undosLeft === 0 || animating) return;
  grid = undoSnapshot.grid;
  score = undoSnapshot.score;
  movesLeft = undoSnapshot.movesLeft;
  undoSnapshot = null;
  undosLeft = 0;
  gameOver = false;
  document.getElementById('overlay').classList.remove('visible');
  render();
}

startNewGame();
</script>
</body>
</html>
